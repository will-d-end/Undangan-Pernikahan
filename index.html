<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'serif'; background-color: #ffffff; }

        #cover-layer { position: relative; width: 100%; height: 100%; }
        .img-cover { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* CONTAINER NAMA & SAPAAN */
        .guest-container { 
            position: absolute; 
            top: 55%; /* Geser naik/turun di sini */
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 85%; 
            pointer-events: none; 
            z-index: 2;
        }

        .greeting-text { font-size: 4vw; color: #555; margin: 0; font-style: italic; }
        .label-text { font-size: 5vw; color: #555; margin: 0; font-weight: bold; }
        #guest-name { font-size: 6vw; color: #8a7355; margin: 5px 0 0 0; font-weight: bold; }

        /* TOMBOL BUKA UNDANGAN (Visible) */
        .visible-btn { 
            position: absolute; 
            top: 75%; /* Geser naik/turun di sini */
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 3;
            padding: 12px 30px;
            font-size: 1.2rem;
            color: #ffffff;
            background-color: #8a7355; /* Warna tema (Emas/Coklat) */
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .visible-btn:active { transform: translate(-50%, -50%) scale(0.95); }

        @media (min-width: 768px) {
            .greeting-text { font-size: 1.2rem; }
            .label-text { font-size: 1.5rem; }
            #guest-name { font-size: 2rem; }
            .visible-btn { padding: 15px 40px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <p class="greeting-text">Kepada Yth:</p>
            <p class="label-text">Bapak/Ibu/Saudara/i:</p>
            <h1 id="guest-name">Tamu Undangan</h1>
        </div>
        
        <button onclick="bukaUndanganCanva()" class="visible-btn">Buka Undangan</button>
        
        <img src="cover.png" class="img-cover" alt="Cover Depan">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        function bukaUndanganCanva() {
            window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
        }
    </script>
</body>
</html>
