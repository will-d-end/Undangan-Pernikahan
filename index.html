<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
        }

        /* SLIDE 1: LAYER COVER (CANVA DEPAN) */
        #cover-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transition: opacity 1.2s ease, visibility 1.2s;
        }

        .iframe-cover {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ELEMEN NAMA TAMU (Melayang di atas Canva Cover) */
        .guest-container {
            position: absolute;
            /* Atur persentase di bawah ini untuk menggeser posisi NAMA TAMU */
            top: 52%; 
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 12;
            text-align: center;
            width: 85%;
            pointer-events: none; /* Supaya klik tidak terhalang */
        }

        #guest-name {
            font-size: 1.8rem;
            color: #8a7355; /* Warna teks nama (bisa diganti sesuai tema Canva) */
            font-weight: bold;
            margin: 0;
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
        }

        /* TOMBOL GHAIB (Melayang pas di atas tombol "Buka Undangan" Canva) */
        .invisible-btn {
            position: absolute;
            /* Atur persentase di bawah ini untuk menggeser posisi TOMBOL */
            top: 72%; 
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 13;
            width: 220px;  /* Lebar area klik tombol ghaib */
            height: 55px;  /* Tinggi area klik tombol ghaib */
            
            /* TIPS: Ubah 'rgba(255, 0, 0, 0)' menjadi 'rgba(255, 0, 0, 0.4)' saat testing di VS Code */
            background: rgba(255, 0, 0, 0); 
            
            border: none;
            cursor: pointer;
            border-radius: 30px;
        }

        /* SLIDE 2: LAYER ISI UNDANGAN (CANVA UTAMA) */
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .iframe-content {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Efek Transisi Memudar */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <h1 id="guest-name">Bapak/Ibu/Saudara/i</h1>
        </div>
        
        <button onclick="bukaUndangan()" class="invisible-btn"></button>

        <iframe src="https://www.canva.com/design/play?src=https://osmaneter.my.canva.site/cover-depan" class="iframe-cover"></iframe>
    </div>

    <div id="content-layer">
        <iframe src="https://www.canva.com/design/play?src=https://osmaneter.my.canva.site/dhigna-wildan" class="iframe-content" allow="autoplay"></iframe>
    </div>

    <audio id="wedding-music" src="musik.mpeg" loop></audio>

    <script>
        // 1. Fungsi Mengambil & Menampilkan Nama Tamu secara Dinamis dari URL (?to=Nama)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) {
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' '));
        }

        // 2. Fungsi Transisi Seamless saat Tombol Diklik
        function bukaUndangan() {
            var audio = document.getElementById("wedding-music");
            
            // Putar musik mp3
            audio.play().catch(function(error) {
                console.log("Autoplay audio memerlukan interaksi fisik terlebih dahulu.");
            });

            // Hilangkan lapisan cover depan dengan transisi fade-out lembut
            document.getElementById("cover-layer").classList.add("fade-out");
        }
    </script>
</body>
</html>
