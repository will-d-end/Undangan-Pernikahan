<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: #ffffff; 
        }

        #cover-layer { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }

        .img-cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        .guest-container { 
            position: absolute; 
            top: 85%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 85%; 
            pointer-events: none; 
            z-index: 2;
        }

        .greeting-text { font-size: 8vw; color: #8a7355; margin: 0; font-style: italic; }
        .label-text { font-size: 8vw; color: #8a7355; margin: 0; font-weight: bold; }
        #guest-name { font-size: 6vw; color: #f4efe1; margin: 5px 0 0 0; font-weight: bold; font-family: serif; }

        .visible-btn { 
            position: absolute; 
            top: 90%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 3;
            padding: 12px 35px;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #8a7355; 
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .greeting-text { font-size: 1.2rem; }
            .label-text { font-size: 1.5rem; }
            #guest-name { font-size: 2rem; }
            .visible-btn { padding: 15px 45px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <p class="greeting-text">Kepada Yth:</p>
            <p class="label-text">Bapak/Ibu/Saudara/i:</p>
            <h1 id="guest-name">Tamu Undangan</h1>
        </div>
        
        <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
        <img src="cover.svg" class="img-cover" alt="Cover Depan">
    </div>

    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Membaca parameter standar ?to= secara instan dan akurat
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        function bukaUndanganSamaPage() {
            var audio = document.getElementById("bg-music");
            audio.play().catch(function(error) {
                console.log("Audio didukung.");
            });

            setTimeout(function() {
                window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
            }, 300);
        }
    </script>
</body>
</html>
