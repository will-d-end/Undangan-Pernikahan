<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        /* 1. RESET BASE - MENJAMIN 100% FULL SCREEN LAYAR PC & HP */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #ffffff;
        }

        /* CONTAINER COVERS - MEMENUHI SELURUH MONITOR PC MAUPUN HP */
        #cover-layer { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Memastikan konten interaktif bersandar dari area bawah */
            align-items: center;
        }

        /* GAMBAR BACKGROUND YANG MEMENUHI SELURUH LAYAR MONITOR PC (ANTI-TERPOTONG / BINGKAI HITAM) */
        .img-cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Gambar otomatis re-scale menyesuaikan rasio PC / HP tanpa merusak aspek rasio asli */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. AREA INTERAKTIF DI TENGAH BAWAH (Dinamis Menyesuaikan Lebar PC vs HP) */
        .content-overlay {
            position: relative;
            bottom: 8%; /* Jarak konstan dari bawah monitor PC / HP Anda */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 2.5vh, 20px); 
            z-index: 2;
            box-sizing: border-box;
        }

        /* 3. DYNAMIC TRANSPARENT BOX (Otomatis re-scale lebar di HP, mengunci batas aman di PC) */
        .guest-container { 
            text-align: center; 
            /* Di HP kotak akan melebar hingga 85%, di PC monitor lebar akan dikunci maksimal di 360px agar tidak melar aneh */
            width: min(85%, 360px); 
            padding: clamp(15px, 4vh, 25px) clamp(10px, 3vw, 20px); 
            box-sizing: border-box;

            /* Setelan kotak transparan putih mewah */
            background-color: rgba(255, 255, 255, 0.85); 
            border-radius: 16px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* FLUID TYPOGRAPHY (Ukuran huruf yang adaptif menggunakan satuan tinggi layar vh/viewport height) */
        .greeting-text { 
            font-size: clamp(0.75rem, 2vh, 0.95rem); 
            color: rgba(85, 85, 85, 0.8); 
            margin: 0; 
            font-style: italic; 
        }
        
        .label-text { 
            font-size: clamp(0.85rem, 2.2vh, 1.05rem); 
            color: #555555; 
            margin: 3px 0 0 0; 
            font-weight: bold; 
        }
        
        #guest-name { 
            font-size: clamp(1.2rem, 3.5vh, 1.65rem); 
            color: #8a7355; 
            margin: 6px 0 0 0; 
            font-weight: bold; 
            font-family: 'Georgia', serif;
            line-height: 1.3;
            word-break: break-word;
        }

        /* 4. DYNAMIC BUTTON (Otomatis re-scale di bawah kotak) */
        .visible-btn { 
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: #ffffff;
            background-color: #8a7355; 
            width: min(50%, 220px); /* Tombol mengunci lebar ideal di PC, responsif di HP */
            
            font-size: clamp(0.85rem, 2.2vh, 1.05rem);
            padding: clamp(10px, 1.8vh, 14px) 10px;
            border-radius: 30px;
            
            box-shadow: 0 6px 20px rgba(138, 115, 85, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        
        .visible-btn:active {
            transform: scale(0.95);
            background-color: #735f44;
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        
        <!-- Background gambar penuh menyapu seluruh monitor PC atau layar HP Anda -->
        <img src="cover.svg" class="img-cover" alt="Cover Depan">
        
        <!-- Blok Konten Teks Nama dan Tombol di Tengah Bawah -->
        <div class="content-overlay">
            <div class="guest-container">
                <p class="greeting-text">Kepada Yth:</p>
                <p class="label-text">Bapak/Ibu/Saudara/i:</p>
                <h1 id="guest-name">Tamu Undangan</h1>
            </div>
            <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
        </div>

    </div>

    <!-- AUDIO UTAMA -->
    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Membaca parameter tautan nama tamu (?to=Nama+Tamu)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        const audio = document.getElementById("bg-music");

       // ====================================================================
        // 1. AUTOPLAY BYPASS: Langsung Unmute Begitu Ada Deteksi Sentuhan/Scroll Pertama
        // ====================================================================
        function triggerAudioUnmute() {
            if (audio.muted) {
                audio.muted = false;
                audio.volume = 1.0; // Setel volume maksimal di awal
                audio.play().catch(err => console.log("Menunggu interaksi pengguna"));
            }
            // Hapus listener setelah suara berhasil dipicu sekali
            window.removeEventListener('touchstart', triggerAudioUnmute);
            window.removeEventListener('click', triggerAudioUnmute);
            window.removeEventListener('scroll', triggerAudioUnmute);
        }

        // Pasang sensor deteksi gerakan pada browser global tamu
        window.addEventListener('touchstart', triggerAudioUnmute, { passive: true });
        window.addEventListener('click', triggerAudioUnmute);
        window.addEventListener('scroll', triggerAudioUnmute, { passive: true });


        // ====================================================================
        // 2. FUNGSI BUTTON + LOGIKA FADE OUT (VOLUME MENGECIL PERLAHAN)
        // ====================================================================
        function bukaUndanganSamaPage() {
            // Pastikan audio menyala dan bersuara saat tombol diklik
            audio.muted = false;
            audio.play().catch(() => {});

            // Interval untuk menurunkan volume setiap 50 milidetik (Fade Out selama ~600ms)
            const fadeAudio = setInterval(function () {
                // Turunkan volume secara bertahap sebesar 0.1 angka
                if (audio.volume > 0.1) {
                    audio.volume -= 0.1;
                } else {
                    // Ketika volume sudah mendekati nol, hentikan interval dan matikan lagu sepenuhnya
                    clearInterval(fadeAudio);
                    audio.pause();

            setTimeout(function() {
                window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
            }, 300);
        }
    </script>
</body>
</html>
