<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: #ffffff; 
        }

        /* 1. LAYER COVER DEPAN */
        #cover-layer { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10;
            background-color: white;
            /* Efek pudar sinematik saat dibuka */
            transition: opacity 1s ease, visibility 1s;
        }

        .img-cover { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* TEKS NAMA TAMU */
        .guest-container { 
            position: absolute; 
            top: 55%; /* Geser naik/turun teks di sini */
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 85%; 
            pointer-events: none; 
            z-index: 12;
        }

        .greeting-text { font-size: 4vw; color: #555555; margin: 0; font-style: italic; }
        .label-text { font-size: 5vw; color: #555555; margin: 0; font-weight: bold; }
        #guest-name { font-size: 6vw; color: #8a7355; margin: 5px 0 0 0; font-weight: bold; font-family: serif; }

        /* TOMBOL BUKA UNDANGAN */
        .visible-btn { 
            position: absolute; 
            top: 75%; /* Geser naik/turun tombol di sini */
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 13;
            padding: 12px 35px;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #8a7355; 
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        /* 2. LAYER ISI UNDANGAN (CANVA INTERAKTIF BYPASS) */
        #content-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        /* Menggunakan Object Element untuk menembus pemblokiran iframe Canva */
        .canva-object { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .fade-out { 
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none; 
        }

        @media (min-width: 768px) {
            .greeting-text { font-size: 1.2rem; }
            .label-text { font-size: 1.5rem; }
            #guest-name { font-size: 2rem; }
            .visible-btn { padding: 15px 45px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <p class="greeting-text">Kepada Yth:</p>
            <p class="label-text">Bapak/Ibu/Saudara/i:</p>
            <h1 id="guest-name">Tamu Undangan</h1>
        </div>
        
        <button onclick="bukaUndangan()" class="visible-btn">Buka Undangan</button>
        <img src="cover.png" class="img-cover" alt="Cover Depan">
    </div>

    <div id="content-layer">
        <object data="https://osmaneter.my.canva.site/dhigna-wildan" class="canva-object"></object>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // 1. Ambil Nama Tamu dari parameter URL
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        // 2. Eksekusi Tombol Buka Undangan
        function bukaUndangan() {
            var audio = document.getElementById("bg-music");
            
            // Mengaktifkan music.mpeg di GitHub secara instan berkat klik tombol dari tamu
            audio.play().catch(function(error) {
                console.log("Izin audio otomatis aktif.");
            });

            // Membuka lapisan cover depan, memperlihatkan Canva interaktif yang sudah stand-by di bawahnya
            document.getElementById("cover-layer").classList.add("fade-out");
        }
    </script>
</body>
</html>
