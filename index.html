<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        /* 1. RESET BASE & BACKGROUND MONITOR PC */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #1e1c1a; /* Warna latar belakang monitor PC agar terlihat kontras dan elegan */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. DYNAMIC LAYOUT BINGKAI (MENGUNCI RASIO DI PC, FLUID DI HP) */
        .viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* LOGIKA MEDIA QUERIES: JIKA LAYAR LEBAR LAYAKNYA PC / LAPTOP / TABLET LANDSCAPE */
        @media (min-width: 501px) and (min-height: 500px) {
            .viewport-wrapper {
                width: 414px;        /* Mengunci lebar persis seukuran layar iPhone Pro Max di PC */
                height: 860px;       /* Mengunci tinggi proporsional smartphone */
                border-radius: 24px; /* Memberikan lekukan sudut estetik layaknya casing HP */
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6); /* Efek bayangan tebal di monitor PC */
                border: 6px solid #2d2a26; /* Frame bezel tipis agar terlihat seperti perangkat nyata */
            }
        }

        /* CONTAINER LAYERING COVER */
        #cover-layer { 
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* GAMBAR COVER AUTO-SCALE (Aman dari melar karena terikat bingkai .viewport-wrapper) */
        .img-cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 3. DYNAMIC BOX NAMA TAMU (TRANSPARAN BANGET LEWAT KODE) */
        .guest-container { 
            position: absolute; 
            top: 80%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            z-index: 2;
            pointer-events: none; 
            
            width: clamp(240px, 80%, 340px); 
            padding: clamp(15px, 4vmin, 25px) clamp(10px, 3vmin, 20px); 
            box-sizing: border-box;

            /* Kombinasi Transparansi Putih 75% murni kode */
            background-color: rgba(255, 255, 255, 0.75); 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* 4. FLUID TYPOGRAPHY */
        .greeting-text { 
            font-size: clamp(0.75rem, 3.5vw, 0.95rem); 
            color: rgba(85, 85, 85, 0.8); 
            margin: 0; 
            font-style: italic; 
        }
        
        .label-text { 
            font-size: clamp(0.85rem, 4vw, 1.05rem); 
            color: #555555; 
            margin: 3px 0 0 0; 
            font-weight: bold; 
        }
        
        #guest-name { 
            font-size: clamp(1.2rem, 5.5vw, 1.6rem); 
            color: #8a7355; 
            margin: 6px 0 0 0; 
            font-weight: bold; 
            font-family: 'Georgia', serif;
            line-height: 1.3;
            word-break: break-word;
        }

        /* 5. DYNAMIC BUTTON */
        .visible-btn { 
            position: absolute; 
            top: 90%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 3;
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: #ffffff;
            background-color: #8a7355; 
            
            font-size: clamp(0.9rem, 4vw, 1.05rem);
            padding: clamp(10px, 2.5vmin, 14px) clamp(25px, 7vw, 40px);
            border-radius: 30px;
            
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background-color 0.2s, transform 0.1s;
        }
        
        .visible-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
            background-color: #735f44;
        }
    </style>
</head>
<body>

    <div class="viewport-wrapper">

        <div id="cover-layer">
            <div class="guest-container">
                <p class="greeting-text">Kepada Yth:</p>
                <p class="label-text">Bapak/Ibu/Saudara/i:</p>
                <h1 id="guest-name">Tamu Undangan</h1>
            </div>
            
            <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
            
            <img src="cover.svg" class="img-cover" alt="Cover Depan">
        </div>

    </div>

    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Membaca parameter tautan nama tamu (?to=Nama+Tamu)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        // Eksekusi Pemutar Lagu + Pengalihan Domain Tab yang Sama
        function bukaUndanganSamaPage() {
            var audio = document.getElementById("bg-music");
            audio.play().catch(function(error) {
                console.log("Izin audio otomatis browser lolos.");
            });

            setTimeout(function() {
                window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
            }, 300);
        }
    </script>
</body>
</html>
