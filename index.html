<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        /* RESET BASE */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #1e1c1a; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTAINER LAYERING COVER */
        #cover-layer { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* SCALE FIT GAMBAR COVER 90% */
        .img-cover { 
            max-width: 90%; 
            max-height: 90vh; 
            width: auto;
            height: auto;
            object-fit: contain; 
            z-index: 1;
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
        }

        /* AREA INTERAKTIF CONTROLLER */
        .content-overlay {
            position: absolute;
            bottom: 8%; 
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 2vh, 16px); 
            z-index: 2;
            box-sizing: border-box;
        }

        /* DYNAMIC TRANSPARENT BOX */
        .guest-container { 
            text-align: center; 
            width: min(80%, 340px); 
            padding: clamp(12px, 3.5vh, 22px) clamp(10px, 3vw, 20px); 
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.88); 
            border-radius: 14px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* FLUID TYPOGRAPHY */
        .greeting-text { font-size: clamp(0.7rem, 1.8vh, 0.9rem); color: rgba(85, 85, 85, 0.8); margin: 0; font-style: italic; }
        .label-text { font-size: clamp(0.8rem, 2vh, 1rem); color: #555555; margin: 2px 0 0 0; font-weight: bold; }
        #guest-name { 
            font-size: clamp(1.15rem, 3.2vh, 1.55rem); color: #8a7355; margin: 5px 0 0 0; 
            font-weight: bold; font-family: 'Georgia', serif; line-height: 1.3; word-break: break-word;
        }

        /* DYNAMIC BUTTON */
        .visible-btn { 
            cursor: pointer; font-weight: bold; border: none; color: #ffffff; background-color: #8a7355; 
            width: min(45%, 200px); font-size: clamp(0.8rem, 2vh, 1rem); padding: clamp(10px, 1.6vh, 12px) 10px; border-radius: 30px;
            box-shadow: 0 6px 15px rgba(138, 115, 85, 0.3); transition: background-color 0.2s, transform 0.1s;
        }
        .visible-btn:active { transform: scale(0.95); background-color: #735f44; }

        @media (min-width: 501px) {
            .img-cover { max-width: 400px; max-height: 820px; }
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <img src="cover.png" class="img-cover" alt="Cover Depan">
        
        <div class="content-overlay">
            <div class="guest-container">
                <p class="greeting-text">Kepada Yth:</p>
                <p class="label-text">Bapak/Ibu/Saudara/i:</p>
                <h1 id="guest-name">Tamu Undangan</h1>
            </div>
            <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
        </div>
    </div>

    <audio id="bg-music" loop autoplay muted playsinline>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Parsing nama tamu dari parameter URL (?to=Nama+Tamu)
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        const audio = document.getElementById("bg-music");

        // ====================================================================
        // 1. AUTOPLAY BYPASS: Langsung Unmute Begitu Ada Deteksi Sentuhan/Scroll Pertama
        // ====================================================================
        function triggerAudioUnmute() {
            if (audio.muted) {
                audio.muted = false;
                audio.volume = 1.0; // Setel volume maksimal di awal
                audio.play().catch(err => console.log("Menunggu interaksi pengguna"));
            }
            // Hapus listener setelah suara berhasil dipicu sekali
            window.removeEventListener('touchstart', triggerAudioUnmute);
            window.removeEventListener('click', triggerAudioUnmute);
            window.removeEventListener('scroll', triggerAudioUnmute);
        }

        // Pasang sensor deteksi gerakan pada browser global tamu
        window.addEventListener('touchstart', triggerAudioUnmute, { passive: true });
        window.addEventListener('click', triggerAudioUnmute);
        window.addEventListener('scroll', triggerAudioUnmute, { passive: true });


        // ====================================================================
        // 2. FUNGSI BUTTON + LOGIKA FADE OUT (VOLUME MENGECIL PERLAHAN)
        // ====================================================================
        function bukaUndanganSamaPage() {
            // Pastikan audio menyala dan bersuara saat tombol diklik
            audio.muted = false;
            audio.play().catch(() => {});

            // Interval untuk menurunkan volume setiap 50 milidetik (Fade Out selama ~600ms)
            const fadeAudio = setInterval(function () {
                // Turunkan volume secara bertahap sebesar 0.1 angka
                if (audio.volume > 0.1) {
                    audio.volume -= 0.1;
                } else {
                    // Ketika volume sudah mendekati nol, hentikan interval dan matikan lagu sepenuhnya
                    clearInterval(fadeAudio);
                    audio.pause();
                    
                    // Pindahkan halaman ke Canva secara halus
                    window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
                }
            }, 50); // Waktu jeda transisi per tahapan reduksi suara
        }
    </script>
</body>
</html>
