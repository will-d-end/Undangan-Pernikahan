<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background-color: #ffffff; }

        /* LAYER COVER DEPAN */
        #cover-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            background-color: white; transition: opacity 1s ease, visibility 1s;
        }
        .img-cover { width: 100%; height: 100%; object-fit: cover; display: block; }

        .guest-container { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 85%; z-index: 12; pointer-events: none; }
        .greeting-text { font-size: 4vw; color: #555; margin: 0; font-style: italic; }
        .label-text { font-size: 5vw; color: #555; margin: 0; font-weight: bold; }
        #guest-name { font-size: 6vw; color: #8a7355; margin: 5px 0 0 0; font-weight: bold; font-family: serif; }

        .visible-btn { 
            position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); z-index: 13;
            padding: 12px 35px; font-size: 1.1rem; color: #ffffff; background-color: #8a7355; 
            border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* LAYER ISI CANVA (EMBED LAYER) */
        #content-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .iframe-content { width: 100%; height: 100%; border: none; }

        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <p class="greeting-text">Kepada Yth:</p>
            <p class="label-text">Bapak/Ibu/Saudara/i:</p>
            <h1 id="guest-name">Tamu Undangan</h1>
        </div>
        <button onclick="bukaUndangan()" class="visible-btn">Buka Undangan</button>
        <img src="cover.png" class="img-cover" alt="Cover">
    </div>

    <div id="content-layer">
        <iframe src="https://www.canva.com/design/play?src=https://osmaneter.my.canva.site/dhigna-wildan" class="iframe-content" allow="autoplay"></iframe>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); }

        function bukaUndangan() {
            // Browser mengizinkan play karena mendeteksi klik pada tombol "Buka Undangan"
            var audio = document.getElementById("bg-music");
            audio.play().catch(function(error) { console.log("Autoplay block bypass gagal."); });

            // Cover memudar, langsung menampilkan Canva yang sudah stand-by di bawahnya
            document.getElementById("cover-layer").classList.add("fade-out");
        }
    </script>
</body>
</html>
