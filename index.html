<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #cover-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .img-cover { width: 100%; height: 100%; object-fit: cover; }
        .guest-container { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 85%; pointer-events: none; }
        #guest-name { font-size: 1.8rem; color: #8a7355; font-weight: bold; font-family: serif; }
        .invisible-btn { position: absolute; top: 72%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 55px; background: rgba(0,0,0,0); border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <h1 id="guest-name">Bapak/Ibu/Saudara/i</h1>
        </div>
        <!-- Tombol ini akan langsung melempar tamu ke web Canva asli -->
        <button onclick="bukaCanvaAsli()" class="invisible-btn"></button>
        <img src="cover.jpg" class="img-cover" alt="Cover">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); }

        function bukaCanvaAsli() {
            // Membuka website Canva asli di tab baru tanpa hambatan iframe
            window.open("https://osmaneter.my.canva.site/dhigna-wildan", "_blank");
        }
    </script>
</body>
</html>
