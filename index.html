<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <link rel="preload" href="cover.png" as="image" fetchpriority="high">
    <style>

        /* 1. RESET BASE - MENJAMIN 100% FULL SCREEN LAYAR PC & HP */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #ffffff;
        }

        /* CONTAINER COVERS - MEMENUHI SELURUH MONITOR PC MAUPUN HP */
        #cover-layer { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Memastikan konten interaktif bersandar dari area bawah */
            align-items: center;
        }

        /* GAMBAR BACKGROUND YANG MEMENUHI SELURUH LAYAR MONITOR PC (ANTI-TERPOTONG / BINGKAI HITAM) */
        .img-cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Gambar otomatis re-scale menyesuaikan rasio PC / HP tanpa merusak aspek rasio asli */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 2. AREA INTERAKTIF DI TENGAH BAWAH (Dinamis Menyesuaikan Lebar PC vs HP) */
        .content-overlay {
            position: relative;
            bottom: 8%; /* Jarak konstan dari bawah monitor PC / HP Anda */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 2.5vh, 20px); 
            z-index: 2;
            box-sizing: border-box;
        }

        /* 3. DYNAMIC TRANSPARENT BOX (Otomatis re-scale lebar di HP, mengunci batas aman di PC) */
        .guest-container { 
            text-align: center; 
            /* Di HP kotak akan melebar hingga 85%, di PC monitor lebar akan dikunci maksimal di 360px agar tidak melar aneh */
            width: min(85%, 360px); 
            padding: clamp(15px, 4vh, 25px) clamp(10px, 3vw, 20px); 
            box-sizing: border-box;

            /* Setelan kotak transparan putih mewah */
            background-color: rgba(255, 255, 255, 0.85); 
            border-radius: 16px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* FLUID TYPOGRAPHY */
        .greeting-text { 
            font-size: clamp(0.75rem, 2vh, 0.95rem); 
            color: rgba(85, 85, 85, 0.8); 
            margin: 0; 
            font-style: italic; 
        }
        
        .label-text { 
            font-size: clamp(0.85rem, 2.2vh, 1.05rem); 
            color: #555555; 
            margin: 3px 0 0 0; 
            font-weight: bold; 
        }
        
        #guest-name { 
            font-size: clamp(1.2rem, 3.5vh, 1.65rem); 
            color: #8a7355; 
            margin: 6px 0 0 0; 
            font-weight: bold; 
            font-family: 'Georgia', serif;
            line-height: 1.3;
            word-break: break-word;
        }

        /* 4. DYNAMIC BUTTON (Otomatis re-scale di bawah kotak) */
        .visible-btn { 
            cursor: pointer;
            font-weight: bold;
            border: none;
            color: #ffffff;
            background-color: #8a7355; 
            width: min(50%, 220px); /* Tombol mengunci lebar ideal di PC, responsif di HP */
            
            font-size: clamp(0.85rem, 2.2vh, 1.05rem);
            padding: clamp(10px, 1.8vh, 14px) 10px;
            border-radius: 30px;
            
            box-shadow: 0 6px 20px rgba(138, 115, 85, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        
        .visible-btn:active {
            transform: scale(0.95);
            background-color: #735f44;
        }
    </style>

</head>
<body>

    <div id="cover-layer">
        
        <img src="cover.png" class="img-cover" alt="Cover Depan">
        
        <div class="content-overlay">
            <div class="guest-container">
                <p class="greeting-text">Kepada Yth:</p>
                <p class="label-text">Bapak/Ibu/Saudara/i:</p>
                <h1 id="guest-name">Tamu Undangan</h1>
            </div>
            <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
        </div>

    </div>

    <script>
        // 1. Membaca parameter nama tamu (?to=Nama+Tamu) dari link WhatsApp
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('to');
        if (name) { 
            document.getElementById('guest-name').innerText = decodeURIComponent(name.replace(/\+/g, ' ')); 
        }

        // 2. Fungsi Tombol: Langsung mengalihkan halaman ke Canva secara instan
        function bukaUndanganSamaPage() {
            window.location.href = "https://will-d-end.my.canva.site/ya-allah-bismillah-ya-allah";
        }
    </script>
</body>
</html>
