<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dhigna & Wildan</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: sans-serif; 
            background-color: #ffffff; 
        }

        /* CONTAINER UTAMA COVER */
        #cover-layer { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }

        .img-cover { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        /* SUSUNAN TEKS NAMA TAMU (RESPONSIF) */
        .guest-container { 
            position: absolute; 
            top: 55%; /* Naik/turunkan persentase ini untuk mengatur posisi teks nama */
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 85%; 
            pointer-events: none; 
            z-index: 2;
        }

        .greeting-text { font-size: 4vw; color: #555555; margin: 0; font-style: italic; }
        .label-text { font-size: 5vw; color: #555555; margin: 0; font-weight: bold; }
        #guest-name { font-size: 6vw; color: #8a7355; margin: 5px 0 0 0; font-weight: bold; font-family: serif; }

        /* TOMBOL BUKA UNDANGAN */
        .visible-btn { 
            position: absolute; 
            top: 75%; /* Naik/turunkan persentase ini untuk mengatur posisi tombol */
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 3;
            padding: 12px 35px;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #8a7355; 
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: bold;
            transition: all 0.2s ease;
        }
        
        .visible-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        @media (min-width: 768px) {
            .greeting-text { font-size: 1.2rem; }
            .label-text { font-size: 1.5rem; }
            #guest-name { font-size: 2rem; }
            .visible-btn { padding: 15px 45px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div id="cover-layer">
        <div class="guest-container">
            <p class="greeting-text">Kepada Yth:</p>
            <p class="label-text">Bapak/Ibu/Saudara/i:</p>
            <h1 id="guest-name">Tamu Undangan</h1>
        </div>
        
        <button onclick="bukaUndanganSamaPage()" class="visible-btn">Buka Undangan</button>
        <img src="cover.png" class="img-cover" alt="Cover Depan">
    </div>

    <!-- AUDIO BACKEND GITHUB -->
    <audio id="bg-music" loop>
        <source src="music.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // ====================================================================
        // 1. LOGIKA PENANGKAP NAMA ANTI-POTONG (SPESIFIK UTK REPO SPASI)
        // ====================================================================
        const urlParams = new URLSearchParams(window.location.search);
        let guestName = urlParams.get('to');

        // Jika parameter ?to= kosong, lakukan ekstraksi dari URL Path (/)
        if (!guestName) {
            const fullPath = window.location.pathname; 
            const pathSegments = fullPath.split('/').filter(segment => segment.length > 0);
            
            if (pathSegments.length > 0) {
                const lastSegment = pathSegments[pathSegments.length - 1];
                
                // Daftar proteksi kata kunci sistem agar nama repo & akun tidak terbaca sebagai nama tamu
                const systemKeywords = [
                    'index.html', 
                    'will-d-end', 
                    'will-d-end.github.io', 
                    'undangan pernikahan', 
                    'undangan%20pernikahan'
                ];
                
                // Jika teks terakhir bukan bagian dari kata kunci sistem, berarti itu adalah nama tamu
                if (!systemKeywords.includes(decodeURIComponent(lastSegment.toLowerCase()))) {
                    guestName = lastSegment;
                }
            }
        }

        // Cetak nama tamu ke layar cover depan secara rapi
        if (guestName) {
            let decodedName = decodeURIComponent(guestName.replace(/\+/g, ' '));
            document.getElementById('guest-name').innerText = decodedName;
        } else {
            document.getElementById('guest-name').innerText = "Tamu Undangan";
        }

        // ====================================================================
        // 2. FUNGSI TRANSISI PINDAH KE CANVA (SAME PAGE)
        // ====================================================================
        function bukaUndanganSamaPage() {
            var audio = document.getElementById("bg-music");
            
            // Putar musik mpeg di latar belakang sesaat untuk memicu izin browser
            audio.play().catch(function(error) {
                console.log("Audio browser bypass log.");
            });

            // Alihkan halaman ke alamat Canva Website interaktif asli Anda
            setTimeout(function() {
                window.location.href = "https://osmaneter.my.canva.site/dhigna-wildan";
            }, 300);
        }
    </script>
</body>
</html>
